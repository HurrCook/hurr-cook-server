spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:hurr_cook}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: true
    show-sql: true
    hibernate:
      ddl-auto: update

app:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration: 24
